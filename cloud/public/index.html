<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGI Market Cloud</title>
    <meta name="theme-color" content="#071c2f">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/favicon.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p>Panel central</p>
        <h1>SGI Market Cloud</h1>
      </div>
      <button id="logoutButton" hidden>Cerrar sesion</button>
    </header>

    <main>
      <section id="loginView" class="card login-card">
        <h2>Ingresar</h2>
        <form id="loginForm">
          <label>Usuario<input id="username" autocomplete="username" required></label>
          <label>Contrasena<input id="password" type="password" autocomplete="current-password" required></label>
          <button type="submit">Ingresar</button>
        </form>
      </section>

      <section id="dashboardView" hidden>
        <div class="toolbar card">
          <label>Sucursal activa<select id="activeStore"></select></label>
          <button id="installButton" class="secondary" hidden>Instalar app</button>
        </div>

        <div class="grid stats">
          <article><span>Clientes</span><strong id="tenantCount">0</strong></article>
          <article><span>Sucursales</span><strong id="storeCount">0</strong></article>
          <article><span>Usuarios</span><strong id="userCount">0</strong></article>
          <article><span>Vendido hoy</span><strong id="todayTotal">Bs 0.00</strong></article>
        </div>

        <div class="grid panels">
          <section class="card sale-panel">
            <h2>Caja online</h2>
            <form id="saleForm">
              <label>Buscar producto<input id="productSearch" placeholder="Codigo, SKU o nombre" autocomplete="off"></label>
              <div id="productResults" class="list compact"></div>
              <div id="cartList" class="list compact"></div>
              <div class="sale-total"><span>Total</span><strong id="cartTotal">Bs 0.00</strong></div>
              <label>Metodo de pago<select id="paymentMethod"><option value="cash">Efectivo</option><option value="qr">QR</option></select></label>
              <label id="cashReceivedLabel">Efectivo recibido<input id="cashReceived" type="number" step="0.01" min="0"></label>
              <label id="qrCodeLabel" hidden>Codigo transaccion QR<input id="qrTransactionCode" placeholder="Opcional"></label>
              <button type="submit">Cobrar venta</button>
            </form>
          </section>

          <section class="card product-panel">
            <h2>Producto</h2>
            <form id="productForm">
              <input id="productId" type="hidden">
              <label>Nombre<input id="productName" required></label>
              <label>Codigo de barras<input id="productBarcode" placeholder="Escanea o escribe"></label>
              <label>SKU<input id="productSku"></label>
              <div class="split">
                <label>Precio venta<input id="productSalePrice" type="number" step="0.01" min="0" required></label>
                <label>Costo<input id="productCostPrice" type="number" step="0.01" min="0"></label>
              </div>
              <div class="split">
                <label>Stock<input id="productStock" type="number" step="0.01"></label>
                <label>Minimo<input id="productMinStock" type="number" step="0.01"></label>
              </div>
              <button type="submit">Guardar producto</button>
            </form>
          </section>

          <section class="card master-only">
            <h2>Crear cliente</h2>
            <form id="tenantForm">
              <label>Negocio<input id="tenantBusinessName" required placeholder="Ej. Tienda Central"></label>
              <label>Dueno<input id="tenantOwnerName" placeholder="Nombre"></label>
              <label>Email<input id="tenantOwnerEmail" type="email" placeholder="correo@dominio.com"></label>
              <button type="submit">Crear cliente</button>
            </form>
          </section>

          <section class="card">
            <h2>Crear sucursal</h2>
            <form id="storeForm">
              <label class="master-only">Cliente<select id="storeTenant"></select></label>
              <label>Sucursal<input id="storeName" required placeholder="Ej. Mutualista"></label>
              <label>Direccion<input id="storeAddress" placeholder="Opcional"></label>
              <button type="submit">Crear sucursal</button>
            </form>
          </section>

          <section class="card">
            <h2>Crear usuario</h2>
            <form id="userForm">
              <label>Nombre<input id="userName" required></label>
              <label>Usuario<input id="userUsername" required></label>
              <label>Email<input id="userEmail" type="email"></label>
              <label>Contrasena<input id="userPassword" type="password" required></label>
              <label class="master-only">Cliente<select id="userTenant"></select></label>
              <label id="userStoreLabel">Sucursal<select id="userStore"></select></label>
              <label>Rol<select id="userRole"></select></label>
              <button type="submit">Crear usuario</button>
            </form>
          </section>
        </div>

        <div class="grid lists">
          <section class="card master-only">
            <h2>Clientes</h2>
            <div id="tenantsList" class="list"></div>
          </section>
          <section class="card">
            <h2>Sucursales</h2>
            <div id="storesList" class="list"></div>
          </section>
          <section class="card">
            <h2>Usuarios</h2>
            <div id="usersList" class="list"></div>
          </section>
          <section class="card">
            <h2>Ventas</h2>
            <div id="salesList" class="list"></div>
          </section>
          <section class="card">
            <h2>Productos</h2>
            <div id="productsList" class="list"></div>
          </section>
        </div>
      </section>
    </main>

    <div id="toast" hidden></div>
    <script src="/app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
      }
    </script>
  </body>
</html>
